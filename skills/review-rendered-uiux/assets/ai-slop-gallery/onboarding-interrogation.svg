<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Onboarding interrogation: bad versus better</title>
  <desc id="desc">Left side shows too many early questions before the user sees product value. Right side asks fewer questions, gives immediate product context, and ties each question to a visible payoff.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <text x="600" y="44" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">Onboarding Interrogation</text>
  <rect x="40" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="24" fill="#b91c1c">Bad</text>
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="24" fill="#111827">Tell us about your goals</text>
  <rect x="80" y="210" width="430" height="42" rx="10" fill="#eef2ff"/>
  <rect x="80" y="272" width="430" height="42" rx="10" fill="#eef2ff"/>
  <rect x="80" y="334" width="430" height="42" rx="10" fill="#eef2ff"/>
  <rect x="80" y="396" width="430" height="42" rx="10" fill="#eef2ff"/>
  <rect x="80" y="458" width="430" height="42" rx="10" fill="#eef2ff"/>
  <rect x="80" y="540" width="160" height="40" rx="20" fill="#111827"/>
  <text x="80" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Problem: too many questions before users see why answering helps them</text>
  <rect x="640" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="24" fill="#065f46">Better</text>
  <text x="680" y="168" font-family="Arial, sans-serif" font-size="24" fill="#111827">See how your first logged day will look</text>
  <rect x="680" y="200" width="220" height="170" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="708" y="236" font-family="Arial, sans-serif" font-size="18" fill="#111827">Preview</text>
  <rect x="930" y="200" width="190" height="46" rx="12" fill="#eef2ff"/>
  <rect x="930" y="266" width="190" height="46" rx="12" fill="#eef2ff"/>
  <text x="930" y="334" font-family="Arial, sans-serif" font-size="16" fill="#374151">Two questions only, each tied to a visible benefit.</text>
  <rect x="930" y="370" width="140" height="40" rx="20" fill="#0f766e"/>
  <text x="680" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Better: value appears before the interrogation starts</text>
</svg>

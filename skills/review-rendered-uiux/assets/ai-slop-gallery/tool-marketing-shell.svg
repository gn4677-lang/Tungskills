<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Tool marketed like a landing page: bad versus better</title>
  <desc id="desc">Left side shows an operational product hidden inside a marketing-page shell with feature bands and testimonials. Right side shows an immediate working tool surface with an obvious starting action and supporting trust cues.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <text x="600" y="44" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">Tool Marketed Like a Landing Page</text>
  <rect x="40" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="24" fill="#b91c1c">Bad</text>
  <rect x="80" y="150" width="430" height="120" rx="20" fill="#eff6ff"/>
  <text x="110" y="205" font-family="Arial, sans-serif" font-size="28" fill="#111827">The future of calorie intelligence</text>
  <rect x="80" y="300" width="430" height="90" rx="16" fill="#eef2ff"/>
  <rect x="80" y="410" width="430" height="90" rx="16" fill="#eef2ff"/>
  <rect x="80" y="520" width="430" height="70" rx="16" fill="#ede9fe"/>
  <text x="80" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Problem: users must scroll through marketing before reaching the working tool</text>
  <rect x="640" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="24" fill="#065f46">Better</text>
  <rect x="680" y="150" width="220" height="360" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="708" y="188" font-family="Arial, sans-serif" font-size="18" fill="#111827">Today’s entries</text>
  <rect x="708" y="208" width="164" height="42" rx="10" fill="#dbeafe"/>
  <rect x="708" y="264" width="164" height="42" rx="10" fill="#dbeafe"/>
  <rect x="708" y="320" width="164" height="42" rx="10" fill="#dbeafe"/>
  <rect x="930" y="150" width="190" height="180" rx="18" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="958" y="188" font-family="Arial, sans-serif" font-size="18" fill="#111827">Start here</text>
  <text x="958" y="220" font-family="Arial, sans-serif" font-size="16" fill="#374151">Log a meal, review evidence, and see the budget impact.</text>
  <rect x="930" y="360" width="190" height="150" rx="18" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="958" y="398" font-family="Arial, sans-serif" font-size="18" fill="#111827">Trust cues</text>
  <text x="958" y="430" font-family="Arial, sans-serif" font-size="16" fill="#374151">Audit trail, evidence, and correction history appear without scrolling through filler.</text>
  <text x="680" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Better: the product works immediately, with trust cues near the task</text>
</svg>

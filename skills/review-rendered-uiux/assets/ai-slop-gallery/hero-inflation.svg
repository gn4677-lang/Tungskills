<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Hero inflation: bad versus better</title>
  <desc id="desc">Left side shows a generic oversized hero with vague promise, decorative gradient, unreadable mockup, and CTA before understanding. Right side shows a literal headline, concrete subheadline, believable product screenshot, and proof near the decision point.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <text x="600" y="44" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">Hero Inflation</text>
  <rect x="40" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="24" fill="#b91c1c">Bad</text>
  <rect x="80" y="150" width="440" height="200" rx="28" fill="#7c3aed"/>
  <circle cx="450" cy="205" r="70" fill="#a78bfa" opacity="0.55"/>
  <text x="110" y="210" font-family="Arial, sans-serif" font-size="34" fill="#ffffff">Unlock the future of work</text>
  <text x="110" y="248" font-family="Arial, sans-serif" font-size="18" fill="#ede9fe">Transform productivity with next-gen intelligence</text>
  <rect x="110" y="286" width="160" height="42" rx="21" fill="#111827"/>
  <text x="190" y="313" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff">Get started</text>
  <rect x="110" y="390" width="380" height="180" rx="18" fill="#e5e7eb"/>
  <rect x="140" y="420" width="320" height="18" rx="9" fill="#cbd5e1"/>
  <rect x="140" y="454" width="280" height="18" rx="9" fill="#cbd5e1"/>
  <rect x="140" y="490" width="220" height="18" rx="9" fill="#cbd5e1"/>
  <text x="110" y="602" font-family="Arial, sans-serif" font-size="18" fill="#374151">Problem: spectacle before understanding</text>
  <rect x="640" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="24" fill="#065f46">Better</text>
  <text x="680" y="180" font-family="Arial, sans-serif" font-size="30" fill="#111827">Track calorie intake with photo-backed meal logs</text>
  <text x="680" y="220" font-family="Arial, sans-serif" font-size="18" fill="#374151">For people managing daily intake who need believable meal entries, budget progress, and corrections they can trust.</text>
  <rect x="680" y="270" width="380" height="220" rx="18" fill="#f9fafb" stroke="#cbd5e1"/>
  <rect x="708" y="300" width="324" height="28" rx="8" fill="#e5e7eb"/>
  <rect x="708" y="342" width="156" height="112" rx="12" fill="#dbeafe"/>
  <rect x="882" y="342" width="150" height="24" rx="8" fill="#bfdbfe"/>
  <rect x="882" y="378" width="120" height="18" rx="8" fill="#cbd5e1"/>
  <rect x="882" y="406" width="136" height="18" rx="8" fill="#cbd5e1"/>
  <rect x="882" y="434" width="100" height="18" rx="8" fill="#cbd5e1"/>
  <rect x="680" y="520" width="190" height="42" rx="21" fill="#0f766e"/>
  <text x="775" y="547" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff">See a sample day</text>
  <text x="680" y="602" font-family="Arial, sans-serif" font-size="18" fill="#374151">Better: literal offer plus believable proof</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Chat-shell cargo cult: bad versus better</title>
  <desc id="desc">Left side shows an AI chat shell reused as the default answer even though the product needs a workflow surface. Right side shows a task-specific workspace with list, detail, and actions where chat is optional rather than dominant.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <text x="600" y="44" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">Chat-Shell Cargo Cult</text>
  <rect x="40" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="24" fill="#b91c1c">Bad</text>
  <rect x="80" y="160" width="110" height="420" rx="18" fill="#e5e7eb"/>
  <rect x="210" y="160" width="310" height="420" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
  <rect x="240" y="206" width="150" height="48" rx="16" fill="#dbeafe"/>
  <rect x="300" y="282" width="180" height="48" rx="16" fill="#e9d5ff"/>
  <rect x="240" y="358" width="150" height="48" rx="16" fill="#dbeafe"/>
  <rect x="210" y="602" width="310" height="18" rx="9" fill="#d1d5db"/>
  <text x="80" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Problem: conversation shell chosen by habit, not task</text>
  <rect x="640" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="24" fill="#065f46">Better</text>
  <rect x="680" y="160" width="160" height="420" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
  <rect x="860" y="160" width="260" height="250" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="860" y="430" width="260" height="150" rx="18" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="712" y="200" font-family="Arial, sans-serif" font-size="18" fill="#111827">Queue</text>
  <text x="892" y="200" font-family="Arial, sans-serif" font-size="18" fill="#111827">Selected item details</text>
  <text x="892" y="468" font-family="Arial, sans-serif" font-size="18" fill="#111827">Assistant help (optional)</text>
  <text x="680" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Better: task workspace first, chat only where it helps</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Evidence console turned into showcase: bad versus better</title>
  <desc id="desc">Left side shows an AI or eval console turned into a glossy showcase with decorative panels and unclear priorities. Right side foregrounds evidence, risk, and next actions so the surface supports investigation and decisions.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <text x="600" y="44" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">Evidence Console Turned Into Showcase</text>
  <rect x="40" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="24" fill="#b91c1c">Bad</text>
  <rect x="80" y="150" width="430" height="150" rx="22" fill="#1e1b4b"/>
  <circle cx="430" cy="220" r="76" fill="#a78bfa" opacity="0.45"/>
  <rect x="100" y="188" width="190" height="74" rx="16" fill="#ffffff" opacity="0.18"/>
  <rect x="80" y="330" width="200" height="110" rx="18" fill="#eef2ff"/>
  <rect x="310" y="330" width="200" height="110" rx="18" fill="#eef2ff"/>
  <rect x="80" y="470" width="430" height="90" rx="18" fill="#ede9fe"/>
  <text x="80" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Problem: glossy panels obscure what needs action, proof, or escalation</text>
  <rect x="640" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="24" fill="#065f46">Better</text>
  <rect x="680" y="150" width="160" height="360" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="708" y="186" font-family="Arial, sans-serif" font-size="18" fill="#111827">Top risks</text>
  <rect x="708" y="208" width="104" height="44" rx="10" fill="#ffedd5"/>
  <rect x="708" y="268" width="104" height="44" rx="10" fill="#ffedd5"/>
  <rect x="708" y="328" width="104" height="44" rx="10" fill="#ffedd5"/>
  <rect x="860" y="150" width="260" height="200" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="888" y="186" font-family="Arial, sans-serif" font-size="18" fill="#111827">Evidence</text>
  <rect x="888" y="208" width="204" height="22" rx="8" fill="#dbeafe"/>
  <rect x="888" y="244" width="176" height="18" rx="8" fill="#cbd5e1"/>
  <rect x="888" y="274" width="190" height="18" rx="8" fill="#cbd5e1"/>
  <rect x="860" y="380" width="260" height="130" rx="18" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="888" y="416" font-family="Arial, sans-serif" font-size="18" fill="#111827">Next actions</text>
  <text x="888" y="448" font-family="Arial, sans-serif" font-size="16" fill="#374151">Escalate, replay, or fix ownership is obvious from the surface.</text>
  <text x="680" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Better: evidence, risk, and next action stay primary</text>
</svg>

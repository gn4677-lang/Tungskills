<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Fake dashboard: bad versus better</title>
  <desc id="desc">Left side shows decorative stats and charts with no clear operator action. Right side shows a real operational surface with exceptions, recent logs, and an explicit action queue.</desc>
  <rect width="1200" height="680" fill="#f5f7fb"/>
  <text x="600" y="44" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#111827">Fake Dashboard</text>
  <rect x="40" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="24" fill="#b91c1c">Bad</text>
  <rect x="80" y="160" width="120" height="84" rx="14" fill="#e0e7ff"/><text x="140" y="208" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">98%</text>
  <rect x="220" y="160" width="120" height="84" rx="14" fill="#ede9fe"/><text x="280" y="208" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">12k</text>
  <rect x="360" y="160" width="120" height="84" rx="14" fill="#dbeafe"/><text x="420" y="208" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">24m</text>
  <rect x="80" y="280" width="400" height="180" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <polyline points="110,420 170,360 230,390 290,320 350,340 430,290" fill="none" stroke="#7c3aed" stroke-width="6"/>
  <rect x="80" y="490" width="190" height="100" rx="16" fill="#eef2ff"/>
  <rect x="290" y="490" width="190" height="100" rx="16" fill="#eef2ff"/>
  <text x="80" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Problem: metrics decorate but do not guide action</text>
  <rect x="640" y="80" width="520" height="560" rx="20" fill="#ffffff" stroke="#d1d5db"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="24" fill="#065f46">Better</text>
  <text x="680" y="160" font-family="Arial, sans-serif" font-size="24" fill="#111827">Today’s review queue</text>
  <rect x="680" y="200" width="220" height="320" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text x="708" y="236" font-family="Arial, sans-serif" font-size="18" fill="#111827">Needs attention</text>
  <rect x="708" y="258" width="164" height="44" rx="10" fill="#ffedd5"/>
  <rect x="708" y="316" width="164" height="44" rx="10" fill="#ffedd5"/>
  <rect x="708" y="374" width="164" height="44" rx="10" fill="#ffedd5"/>
  <text x="930" y="236" font-family="Arial, sans-serif" font-size="18" fill="#111827">Recent evidence</text>
  <rect x="930" y="258" width="190" height="120" rx="14" fill="#dbeafe"/>
  <rect x="930" y="400" width="190" height="120" rx="14" fill="#dcfce7"/>
  <text x="680" y="568" font-family="Arial, sans-serif" font-size="16" fill="#374151">Queue + evidence + action path = trustworthy operations UI</text>
  <text x="680" y="622" font-family="Arial, sans-serif" font-size="18" fill="#374151">Better: every panel supports a concrete operator decision</text>
</svg>
